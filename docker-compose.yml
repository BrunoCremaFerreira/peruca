services:
  peruca:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: peruca
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      PERUCA_DB_CONNECTION_STRING: "sqlite:///data/peruca.db"
    volumes:
      - peruca_data:/data
    restart: unless-stopped

volumes:
  peruca_data:
